# .github/workflows/ci.yml
# Continuous Integration for mc-trader
#
# Runs on every push and pull request against main/master:
#   1. ruff check  — lint
#   2. ruff format --check  — formatting
#   3. mypy  — static type check
#   4. pytest --cov  — tests + coverage
#   5. Upload coverage to Codecov
#
# Python matrix: 3.10 / 3.11 / 3.12
# (3.14 is pre-release and not yet supported by pyproject.toml's requires-python.)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Python ${{ matrix.python-version }} — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest]
        # Add windows-latest to the matrix below if cross-platform parity matters.
        # It is omitted here to keep CI times short; the Docker image uses Linux.

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -r requirements-dev.txt
          # Ensure the editable install picks up the package
          pip install -e . --no-deps

      # ── 4. Lint with ruff ─────────────────────────────────────────────────
      - name: Lint — ruff check
        run: ruff check .

      - name: Format — ruff format --check
        run: ruff format --check .

      # ── 5. Type check with mypy ───────────────────────────────────────────
      - name: Type check — mypy
        run: mypy core/ api/ config.py
        continue-on-error: true  # mypy findings are informational until stubs are complete

      # ── 6. Run tests with coverage ────────────────────────────────────────
      - name: Test — pytest + coverage
        env:
          # Stub all external API keys so tests never attempt live network calls.
          FRED_API_KEY: "test-key-unused"
          ALPACA_API_KEY: "test-key-unused"
          ALPACA_SECRET_KEY: "test-key-unused"
          POLYGON_API_KEY: "test-key-unused"
          ALPACA_MODE: "paper"
          HOST: "127.0.0.1"
          PORT: "8000"
        run: |
          pytest \
            --cov=core \
            --cov=api \
            --cov=config \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      # ── 7. Upload coverage to Codecov ─────────────────────────────────────
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'   # upload once, from the middle version
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          name: codecov-py${{ matrix.python-version }}
          fail_ci_if_error: false   # don't break CI on Codecov outages
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Optional: Docker build smoke test ─────────────────────────────────────
  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'   # only on push, not PRs from forks

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mc-trader:ci .

      - name: Smoke test — server starts without error
        run: |
          docker run --rm \
            -e FRED_API_KEY=test \
            -e ALPACA_API_KEY=test \
            -e ALPACA_SECRET_KEY=test \
            -e POLYGON_API_KEY=test \
            -e HOST=0.0.0.0 \
            -e PORT=8000 \
            -e TICKER=AAPL \
            mc-trader:ci \
            python -c "import core.montecarlo; print('import ok')"
