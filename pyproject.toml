# ──────────────────────────────────────────────────────────────────────────
# pyproject.toml — Python tooling config.
# Added in the May 2026 Phase 2 refactor.
#
# Run ruff with:
#   ruff check .
#   ruff format .
#
# Install ruff first:
#   pip install ruff
# ──────────────────────────────────────────────────────────────────────────

[tool.ruff]
# Match the Python version the .venv targets (see .venv/pyvenv.cfg).
target-version = "py310"
line-length    = 110

# Don't try to lint the venv, build artifacts, or test fixtures.
exclude = [
    ".venv",
    ".git",
    ".idea",
    "__pycache__",
    "build",
    "dist",
    "resource_image",
    "static/monte_carlo_microstructure.py",  # legacy file scheduled for removal
]

[tool.ruff.lint]
# A pragmatic starting rule set — strict on real bugs, lenient on style nits
# that the existing codebase doesn't conform to.
select = [
    "E",       # pycodestyle errors
    "F",       # pyflakes (undefined names, unused imports)
    "W",       # pycodestyle warnings
    "I",       # isort (import ordering)
    "B",       # bugbear (likely bugs, e.g. mutable default args)
    "C4",      # comprehensions
    "UP",      # pyupgrade — flag obsolete syntax
    "SIM",     # flake8-simplify
    "RUF",     # ruff-specific rules
]
ignore = [
    "E501",    # line too long — we set line-length already and don't want this firing on existing prose
    "E731",    # lambda assignment — used in several places intentionally for short helpers
    "B008",    # function call in default arg — false positives with FastAPI's Depends(...)
    "SIM108",  # ternary instead of if/else — readability call, leave as-is
    "RUF012",  # mutable class attrs without ClassVar — false positives in dataclasses
]

[tool.ruff.lint.per-file-ignores]
"tests/*"           = ["E402"]  # allow late imports in test files
"core/montecarlo.py" = ["E741"] # ambiguous variable names (l, I, O) in math code
"core/signal.py"     = ["E741"]
"core/indicators.py" = ["E741"]

[tool.ruff.format]
quote-style          = "double"
indent-style         = "space"
line-ending          = "auto"
docstring-code-format = true

# ── pytest ────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
minversion       = "9.0"
testpaths        = ["tests"]
filterwarnings   = [
    "ignore::DeprecationWarning:yfinance.*",
    "ignore::DeprecationWarning:pkg_resources.*",
]
